name: Pre-Merge Checklist

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  checklist-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR description checklist
        run: |
          BODY="${{ github.event.pull_request.body }}"

          # Required items
          REQUIRED_ITEMS=("PR Created" "CR Attached" "Regression Checked" "Snyk Check Done" "Unit Tests Written" "Test Screenshots Attached")

          MISSING=false
          for ITEM in "${REQUIRED_ITEMS[@]}"; do
            if ! grep -q "\- 

\[x\]

 $ITEM" <<< "$BODY"; then
              echo "❌ Missing: $ITEM"
              MISSING=true
            else
              echo "✅ $ITEM"
            fi
          done

          if [ "$MISSING" = true ]; then
            echo "Checklist validation failed. Please update PR description."
            exit 1
          fi
